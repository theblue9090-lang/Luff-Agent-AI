<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF2E3E"/>
      <stop offset="1" stop-color="#FF6A3D"/>
    </linearGradient>
    <linearGradient id="straw" x1="10" y1="26" x2="54" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5CE5B"/>
      <stop offset="1" stop-color="#E1A93C"/>
    </linearGradient>
    <linearGradient id="strawTop" x1="22" y1="14" x2="42" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBDD79"/>
      <stop offset="1" stop-color="#E8B646"/>
    </linearGradient>
  </defs>

  <!-- badge background -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="#140A0D" stroke="url(#ring)" stroke-width="2"/>

  <!-- straw hat -->
  <g>
    <!-- brim -->
    <ellipse cx="32" cy="41" rx="24" ry="8.5" fill="url(#straw)"/>
    <ellipse cx="32" cy="41" rx="24" ry="8.5" fill="none" stroke="#B9822B" stroke-width="0.8" opacity="0.6"/>
    <!-- brim inner shade -->
    <ellipse cx="32" cy="40" rx="14" ry="4.6" fill="#C98F2E" opacity="0.55"/>
    <!-- crown -->
    <path d="M18 40 C18 26 24 18 32 18 C40 18 46 26 46 40 Z" fill="url(#strawTop)"/>
    <!-- crown straw lines -->
    <path d="M25 39 C25 29 27 22 32 20" stroke="#C98F2E" stroke-width="0.9" opacity="0.5" fill="none"/>
    <path d="M39 39 C39 29 37 22 32 20" stroke="#C98F2E" stroke-width="0.9" opacity="0.5" fill="none"/>
    <!-- red band -->
    <path d="M18.5 37.5 C24 34.5 40 34.5 45.5 37.5 C40 40 24 40 18.5 37.5 Z" fill="url(#ring)"/>
    <rect x="30" y="33.5" width="4" height="6" rx="1.2" fill="#E01029"/>
  </g>
</svg>
